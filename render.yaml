# render.yaml — Commit to GitHub root → Render auto-detects this
services:
  - type: web
    name: cyberaware-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false   # paste your Supabase URL manually in Render dashboard
      - key: JWT_SECRET
        value: cyberaware2025supersecret
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false   # your Vercel URL
      - key: BACKEND_URL
        sync: false   # your Render URL
